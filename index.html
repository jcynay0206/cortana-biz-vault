<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTANA // OMNI-CORE V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #03050a;
            --bg2:      #060a12;
            --blue:     #00d4ff;
            --blue2:    #0055dd;
            --green:    #00ff9d;
            --red:      #ff3b3b;
            --gold:     #f59e0b;
            --purple:   #a78bfa;
            --border:   rgba(0,212,255,0.12);
            --text:     #b8d4e8;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; height:100vh; overflow:hidden; }
        .mono { font-family:'Share Tech Mono',monospace; }
        .orb  { font-family:'Orbitron',sans-serif; }

        /* SCANLINES */
        body::after {
            content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
        }
        /* GRID */
        .grid-bg {
            position:fixed; inset:0; z-index:0; pointer-events:none;
            background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
            background-size:60px 60px; animation:gp 8s ease-in-out infinite;
        }
        @keyframes gp{0%,100%{opacity:.3}50%{opacity:.6}}

        /* \u2550\u2550\u2550 SCREENS \u2550\u2550\u2550 */
        .screen { position:fixed; inset:0; z-index:50; display:none; }
        .screen.active { display:flex; }

        /* \u2550\u2550\u2550 AUTH SCREEN \u2550\u2550\u2550 */
        #screen-auth {
            background:var(--bg);
            align-items:center; justify-content:center; flex-direction:column;
        }
        .auth-card {
            position:relative; width:440px;
            background:linear-gradient(160deg,#070e1c,#040810);
            border:1px solid rgba(0,212,255,.2);
            box-shadow:0 0 80px rgba(0,212,255,.05), inset 0 0 60px rgba(0,0,0,.5);
            padding:44px; animation:cardIn .5s ease-out;
        }
        @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .auth-card::before{content:'';position:absolute;top:0;left:0;width:18px;height:18px;border-top:2px solid var(--blue);border-left:2px solid var(--blue);}
        .auth-card::after {content:'';position:absolute;bottom:0;right:0;width:18px;height:18px;border-bottom:2px solid var(--blue);border-right:2px solid var(--blue);}
        .auth-input {
            width:100%; background:rgba(0,212,255,.03); border:1px solid rgba(0,212,255,.15);
            color:#c8daee; font-family:'Share Tech Mono',monospace; font-size:13px;
            padding:12px 15px; outline:none; transition:all .2s; margin-bottom:10px;
        }
        .auth-input:focus{border-color:rgba(0,212,255,.5);box-shadow:0 0 15px rgba(0,212,255,.06);}
        .auth-input::placeholder{color:#1a4050;}
        .auth-btn {
            width:100%; font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700;
            letter-spacing:.2em; padding:13px; background:linear-gradient(135deg,#003399,#0055cc);
            color:#fff; border:none; cursor:pointer; transition:all .2s;
            clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
        }
        .auth-btn:hover{background:linear-gradient(135deg,#0044bb,#0066ee);box-shadow:0 0 30px rgba(0,80,200,.4);}
        .auth-btn:disabled{opacity:.4;cursor:not-allowed;}
        .tab-btn{flex:1;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:10px;background:transparent;border:1px solid rgba(0,212,255,.1);color:#2a6070;cursor:pointer;transition:all .2s;}
        .tab-btn.active{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.35);color:var(--blue);}

        /* \u2550\u2550\u2550 PAYWALL SCREEN \u2550\u2550\u2550 */
        #screen-paywall {
            background:rgba(3,5,10,.97); backdrop-filter:blur(24px);
            align-items:center; justify-content:center; flex-direction:column;
            z-index:80;
        }
        .paywall-wrap { position:relative; width:100%; max-width:900px; padding:40px; animation:cardIn .5s ease-out; }
        .plan-card {
            background:linear-gradient(160deg,#070e1c,#040810);
            border:1px solid rgba(0,212,255,.12); padding:28px 22px;
            position:relative; overflow:hidden; transition:all .3s; cursor:pointer;
        }
        .plan-card:hover{border-color:rgba(0,212,255,.4);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,212,255,.1);}
        .plan-card.featured{border-color:rgba(167,139,250,.4);background:linear-gradient(160deg,#0a0818,#060410);}
        .plan-card.featured:hover{box-shadow:0 12px 40px rgba(167,139,250,.15);}
        .plan-card.elite-card{border-color:rgba(245,158,11,.3);background:linear-gradient(160deg,#100c04,#0a0802);}
        .plan-card.elite-card:hover{box-shadow:0 12px 40px rgba(245,158,11,.12);}
        .plan-badge-pill{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:4px 12px;border:1px solid;}
        .badge-basico{color:#60a5fa;border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.07);}
        .badge-pro{color:var(--purple);border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.07);}
        .badge-elite{color:var(--gold);border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.07);}
        .plan-price{font-family:'Orbitron',sans-serif;font-weight:900;font-size:32px;margin:12px 0 4px;}
        .plan-feature{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;color:#6a9aaa;border-bottom:1px solid rgba(0,212,255,.05);}
        .plan-feature:last-child{border:none;}
        .plan-feature .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
        .plan-btn{
            width:100%;margin-top:18px;font-family:'Orbitron',sans-serif;font-size:10px;
            font-weight:700;letter-spacing:.18em;padding:12px;border:none;cursor:pointer;transition:all .2s;
            clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
        }
